<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Decorative: YAML code block on left -->
  <g opacity="0.07" transform="translate(60, 80)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#f97316">meta:</text>
    <text x="16" y="20" font-family="monospace" font-size="14" fill="#fb923c">title: "Demo"</text>
    <text x="0" y="50" font-family="monospace" font-size="14" fill="#f97316">steps:</text>
    <text x="16" y="70" font-family="monospace" font-size="14" fill="#fb923c">- action: click</text>
    <text x="16" y="90" font-family="monospace" font-size="14" fill="#fb923c">- action: type</text>
    <text x="16" y="110" font-family="monospace" font-size="14" fill="#fb923c">- action: navigate</text>
    <text x="16" y="130" font-family="monospace" font-size="14" fill="#fb923c">- action: wait</text>
  </g>

  <!-- Decorative: arrow from YAML to video -->
  <g opacity="0.06">
    <line x1="280" y1="170" x2="350" y2="170" stroke="#f97316" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="350,165 365,170 350,175" fill="#f97316"/>
  </g>

  <!-- Decorative: browser window on right -->
  <g opacity="0.07" transform="translate(950, 100)">
    <rect x="0" y="0" width="160" height="110" rx="6" stroke="#fb923c" stroke-width="2"/>
    <line x1="0" y1="20" x2="160" y2="20" stroke="#fb923c" stroke-width="1.5"/>
    <!-- Window dots -->
    <circle cx="12" cy="10" r="3" fill="#ef4444" opacity="0.6"/>
    <circle cx="24" cy="10" r="3" fill="#f59e0b" opacity="0.6"/>
    <circle cx="36" cy="10" r="3" fill="#10b981" opacity="0.6"/>
    <!-- Play button overlay -->
    <polygon points="65,50 65,90 100,70" stroke="#f97316" stroke-width="2" fill="none"/>
  </g>

  <!-- Decorative: cursor trail -->
  <g opacity="0.05">
    <circle cx="400" cy="300" r="3" fill="#f97316"/>
    <circle cx="450" cy="310" r="2.5" fill="#f97316"/>
    <circle cx="500" cy="305" r="2" fill="#f97316"/>
    <circle cx="550" cy="315" r="1.5" fill="#f97316"/>
    <path d="M 400 300 Q 430 320 450 310 Q 470 300 500 305 Q 530 310 550 315" stroke="#f97316" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
  </g>

  <!-- Decorative: film timeline -->
  <g opacity="0.05" transform="translate(300, 340)">
    <line x1="0" y1="0" x2="600" y2="0" stroke="#fb923c" stroke-width="2"/>
    <rect x="50" y="-8" width="80" height="16" rx="3" stroke="#f97316" stroke-width="1.5" fill="none"/>
    <rect x="160" y="-8" width="120" height="16" rx="3" stroke="#f97316" stroke-width="1.5" fill="none"/>
    <rect x="310" y="-8" width="60" height="16" rx="3" stroke="#f97316" stroke-width="1.5" fill="none"/>
    <rect x="400" y="-8" width="100" height="16" rx="3" stroke="#f97316" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Title -->
  <text x="600" y="165" text-anchor="middle" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="bold" fill="#fdba74">
    demo-machine
  </text>

  <!-- Subtitle -->
  <text x="600" y="220" text-anchor="middle" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#8b949e">
    Demo as code — turn YAML specs into polished product demo videos
  </text>

  <!-- Accent line -->
  <rect x="430" y="248" width="340" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>
